<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>auto-translator</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36; --text: #e6e9ef;
    --muted: #8b93a7; --accent: #4f8cff; --accent-dim: #2a3b5e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8; --panel: #ffffff; --border: #e1e4ea; --text: #1b1f27;
      --muted: #6b7280; --accent: #2563eb; --accent-dim: #dbe6ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 14px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  .spacer { flex: 1; }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; outline: none;
  }
  select:focus { border-color: var(--accent); }
  .swap {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 15px;
  }
  .swap:hover { border-color: var(--accent); }
  main {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 0;
  }
  .pane { display: flex; flex-direction: column; min-height: 0; }
  .pane:first-child { border-right: 1px solid var(--border); }
  .pane-head {
    padding: 8px 16px; font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 8px; min-height: 34px;
  }
  textarea, .output {
    flex: 1; width: 100%; border: none; outline: none; resize: none;
    background: transparent; color: var(--text); padding: 8px 18px 18px;
    font-size: 21px; line-height: 1.55; font-family: inherit;
    overflow: auto; white-space: pre-wrap; word-break: break-word;
  }
  /* Output is editable + drag-selectable (correct wording, copy freely). */
  .output {
    -webkit-user-select: text; user-select: text; cursor: text;
  }
  .output:empty::before { content: "翻訳結果"; color: var(--muted); }
  /* Alternative-wording popup (post-edit) */
  .altmenu {
    position: fixed; z-index: 50; min-width: 140px; max-width: 280px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; box-shadow: 0 8px 28px rgba(0,0,0,.35);
    font-size: 14px; max-height: 46vh; overflow: auto;
  }
  .altmenu[hidden] { display: none; }
  .altmenu .althead {
    padding: 5px 10px 6px; font-size: 11px; color: var(--muted);
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .altmenu button {
    display: block; width: 100%; text-align: left; background: transparent;
    border: none; color: var(--text); border-radius: 7px; padding: 7px 10px;
    font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .altmenu button:hover { background: var(--accent-dim); }
  .altmenu .altnote { padding: 7px 10px; color: var(--muted); font-size: 12.5px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    display: inline-block;
  }
  .dot.busy { background: var(--accent); animation: pulse 1s infinite; }
  .dot.err { background: #e5484d; }
  @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
  .status { font-size: 12px; color: var(--muted); }
  .copy {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 3px 9px; font-size: 12px;
    cursor: pointer;
  }
  .copy:hover { color: var(--text); border-color: var(--accent); }
  .notice {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 16px; font-size: 13px; line-height: 1.45;
    border-bottom: 1px solid var(--border);
  }
  .notice[hidden] { display: none; }
  .notice .msg { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .notice .x { cursor: pointer; opacity: .65; font-size: 12px; padding: 0 2px; }
  .notice .x:hover { opacity: 1; }
  .notice.info { background: var(--accent-dim); color: var(--text); }
  .notice.err  { background: #3a1d1f; color: #ffd9d9; }
  .notice.err .msg { cursor: pointer; text-decoration: underline dotted; }
  .notice .acts { display: flex; gap: 6px; }
  .notice .acts button {
    border: 1px solid var(--border); background: var(--accent); color: #fff;
    border-radius: 6px; padding: 3px 12px; font-size: 12px; cursor: pointer;
  }
  .notice .acts button.sec { background: transparent; color: var(--text); }
  .notice .acts button:hover { filter: brightness(1.1); }
  @media (prefers-color-scheme: light) {
    .notice.err { background: #fde8e8; color: #8a1c1c; }
  }
  .logpanel { border-top: 1px solid var(--border); font-size: 12px; }
  .logpanel > summary {
    list-style: none; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    color: var(--muted);
  }
  .logpanel > summary::-webkit-details-marker { display: none; }
  .logpanel > summary::before { content: "▸"; font-size: 11px; }
  .logpanel[open] > summary::before { content: "▾"; }
  .logpanel .logbtn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 2px 9px; font-size: 12px; cursor: pointer;
  }
  .logpanel .logbtn:hover { color: var(--text); border-color: var(--accent); }
  .logpanel .right { margin-left: auto; display: flex; gap: 6px; }
  #logBody {
    margin: 0; padding: 10px 16px; max-height: 34vh; overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    background: rgba(127,127,127,.06); color: var(--text);
  }
</style>
</head>
<body>
  <header>
    <h1>🌐 auto-translator</h1>
    <select id="engine" title="翻訳エンジン"></select>
    <div class="spacer"></div>
    <select id="src" title="原文の言語"></select>
    <button class="swap" id="swap" title="言語を入れ替え">⇄</button>
    <select id="tgt" title="翻訳先の言語"></select>
  </header>
  <div id="notice" class="notice" hidden>
    <span class="msg" id="noticeMsg"></span>
    <span class="acts" id="noticeActions"></span>
    <span class="x" id="noticeX" title="閉じる">✕</span>
  </div>
  <main>
    <section class="pane">
      <div class="pane-head"><span class="dot" id="dot"></span><span class="status" id="status">準備中…</span></div>
      <textarea id="input" placeholder="ここに文章を入力すると、自動で翻訳します…" autofocus></textarea>
    </section>
    <section class="pane">
      <div class="pane-head">
        <span id="detected" class="status"></span>
        <button class="copy" id="reset" title="編集した内容を、翻訳直後の状態に戻します" hidden>元に戻す</button>
        <button class="copy" id="copy">コピー</button>
      </div>
      <div class="output" id="output" contenteditable="true" spellcheck="false"
           title="ドラッグで選択してコピー・直接編集できます。単語をダブルクリックすると言い換え候補（Gemmaエンジン選択時）"></div>
    </section>
  </main>
  <div class="altmenu" id="altmenu" hidden></div>
  <details class="logpanel" id="logpanel">
    <summary>
      ログ
      <span class="right">
        <button class="logbtn" id="logCopy" title="ログをコピー">コピー</button>
        <button class="logbtn" id="logRefresh" title="再読み込み">更新</button>
      </span>
    </summary>
    <pre id="logBody">（ログはここに表示されます）</pre>
  </details>

<script>
const $ = (id) => document.getElementById(id);
let CONFIG = null;
let timer = null;
let reqSeq = 0;
let altSeq = 0;
let lastTranslation = "";   // server result of the latest translation (for "元に戻す")

function fillLangSelect(sel, langs, includeAuto) {
  sel.innerHTML = "";
  if (includeAuto) {
    const o = document.createElement("option");
    o.value = "auto"; o.textContent = "自動検出";
    sel.appendChild(o);
  }
  for (const l of langs) {
    const o = document.createElement("option");
    o.value = l.code;
    o.textContent = `${l.native} (${l.name})`;
    sel.appendChild(o);
  }
}

async function init() {
  CONFIG = await (await fetch("/api/config")).json();
  fillLangSelect($("src"), CONFIG.languages, true);
  fillLangSelect($("tgt"), CONFIG.languages, false);
  $("src").value = "auto";
  $("tgt").value = "ja";

  const eng = $("engine");
  eng.innerHTML = "";
  for (const e of CONFIG.engines) {
    const o = document.createElement("option");
    o.value = e.name;
    o.textContent = e.available ? e.label : `${e.label} — 未導入`;
    o.disabled = !e.available;
    if (!e.available && e.reason) o.title = e.reason;  // hover shows why
    eng.appendChild(o);
  }
  eng.value = CONFIG.default_engine;
  // With a single engine there's nothing to choose — hide the selector.
  if (CONFIG.engines.length <= 1) eng.style.display = "none";

  setStatus("ready", "準備完了。入力してください。");

  // Surface any engines that can't be used (e.g. llama.cpp not installed).
  const down = CONFIG.engines.filter((e) => !e.available);
  if (down.length) {
    showNotice("info",
      down.map((e) => `「${e.label}」は利用できません。\n${e.reason || ""}`).join("\n\n"));
  }

  $("input").addEventListener("input", schedule);
  $("engine").addEventListener("change", () => translateNow(true));
  $("src").addEventListener("change", () => translateNow(true));
  $("tgt").addEventListener("change", () => translateNow(true));
  $("swap").addEventListener("click", swapLangs);
  $("copy").addEventListener("click", copyOut);
  $("reset").addEventListener("click", resetTranslation);
  $("output").addEventListener("dblclick", onWordDblClick);
  $("output").addEventListener("input", updateResetBtn);
  // Dismiss the alternatives popup on outside click / Escape.
  document.addEventListener("mousedown", (e) => {
    if (!$("altmenu").contains(e.target)) hideAltMenu();
  });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") hideAltMenu(); });
  $("noticeX").addEventListener("click", clearNotice);
  $("noticeMsg").addEventListener("click", () => { if (noticeKind === "err") openLogs(); });

  // Log panel: refresh while open, copy for debugging.
  $("logpanel").addEventListener("toggle", (e) => {
    if (e.target.open) { fetchLogs(); logTimer = setInterval(fetchLogs, 2000); }
    else { clearInterval(logTimer); logTimer = null; }
  });
  $("logRefresh").addEventListener("click", fetchLogs);
  $("logCopy").addEventListener("click", copyLogs);
}

let logTimer = null;
async function fetchLogs() {
  try {
    const data = await (await fetch("/api/logs")).json();
    const body = $("logBody");
    const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 30;
    body.textContent = (data.lines || []).join("\n") || "（ログはまだありません）";
    if (atBottom) body.scrollTop = body.scrollHeight;
  } catch (e) { /* server may be busy/starting */ }
}
function copyLogs() {
  navigator.clipboard.writeText($("logBody").textContent || "").then(() => {
    const b = $("logCopy"); b.textContent = "コピーしました";
    setTimeout(() => (b.textContent = "コピー"), 1200);
  });
}

let noticeKind = null;
function showNotice(kind, msg) {
  noticeKind = kind;
  const n = $("notice");
  n.className = "notice " + (kind === "err" ? "err" : "info");
  $("noticeMsg").textContent = msg;
  $("noticeActions").innerHTML = "";
  n.hidden = false;
}
function clearNotice() { $("notice").hidden = true; noticeKind = null; $("noticeActions").innerHTML = ""; }
function showConfirm(msg, okLabel, onOk) {
  showNotice("info", msg);
  const acts = $("noticeActions");
  const ok = document.createElement("button");
  ok.textContent = okLabel;
  ok.onclick = () => { clearNotice(); onOk(); };
  const cancel = document.createElement("button");
  cancel.textContent = "キャンセル"; cancel.className = "sec";
  cancel.onclick = clearNotice;
  acts.append(ok, cancel);
}

function setStatus(kind, msg) {
  const dot = $("dot");
  dot.className = "dot" + (kind === "busy" ? " busy" : kind === "err" ? " err" : "");
  $("status").textContent = msg;
}

function schedule() {
  clearTimeout(timer);
  timer = setTimeout(() => translateNow(false), 350);
}

function swapLangs() {
  const s = $("src").value, t = $("tgt").value;
  if (s === "auto") {
    // can't move "auto" to target; use detected if present, else English
    $("src").value = t;
    $("tgt").value = (CONFIG.lastDetected && CONFIG.lastDetected !== t) ? CONFIG.lastDetected : "en";
  } else {
    $("src").value = t; $("tgt").value = s;
  }
  // also swap the texts for a natural feel
  const out = $("output").textContent;
  if (out) { $("input").value = out; }
  translateNow(true);
}

async function translateNow(force, confirmDownload = false) {
  const text = $("input").value;
  const out = $("output");
  if (!text.trim()) {
    out.textContent = "";          // empty -> CSS shows the placeholder
    lastTranslation = "";
    updateResetBtn();
    hideAltMenu();
    $("detected").textContent = "";
    setStatus("ready", "準備完了。入力してください。");
    return;
  }
  const seq = ++reqSeq;
  setStatus("busy", "翻訳中…");
  try {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text,
        src: $("src").value,
        tgt: $("tgt").value,
        engine: $("engine").value,
        confirm_download: confirmDownload,
      }),
    });
    const data = await res.json();
    if (seq !== reqSeq) return; // a newer request superseded this one
    if (data.detected) CONFIG.lastDetected = data.detected;
    if (data.needs_download) {
      const sel = $("engine");
      const lbl = sel.options[sel.selectedIndex].textContent;
      showConfirm(
        `「${lbl}」のモデル（約${data.size_gb}GB）をダウンロードします。`
        + `初回のみ・以降はオフラインで動作します。実行しますか？`,
        "ダウンロードして実行",
        () => translateNow(true, true),
      );
      setStatus("ready", "ダウンロードの確認待ち");
      return;
    }
    if (data.error) {
      setStatus("err", "エラー");
      showNotice("err", "エラーがあります。詳細は下部の「ログ」を確認してください。");
      if (logTimer) fetchLogs();   // refresh if the log panel is already open
      return;
    }
    if (noticeKind === "err") clearNotice();  // a good result clears stale errors
    out.textContent = data.translation || "";
    lastTranslation = data.translation || "";
    updateResetBtn();
    hideAltMenu();
    if ($("src").value === "auto" && data.detected) {
      const l = CONFIG.languages.find((x) => x.code === data.detected);
      $("detected").textContent = "検出: " + (l ? l.native : data.detected);
    } else {
      $("detected").textContent = "";
    }
    setStatus("ready", "完了");
  } catch (e) {
    if (seq !== reqSeq) return;
    setStatus("err", "通信エラー");
    showNotice("err", "サーバと通信できませんでした。詳細は下部の「ログ」を確認してください。");
  }
}

function openLogs() {
  const lp = $("logpanel");
  if (!lp.open) lp.open = true;   // fires 'toggle' -> starts polling
  fetchLogs();
  lp.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function copyOut() {
  const t = $("output").textContent;
  if (t) navigator.clipboard.writeText(t).then(() => {
    $("copy").textContent = "コピーしました";
    setTimeout(() => ($("copy").textContent = "コピー"), 1200);
  });
}

// ---- Post-edit: show/hide the "元に戻す" button, restore last translation ----
function updateResetBtn() {
  const edited = lastTranslation && $("output").textContent !== lastTranslation;
  $("reset").hidden = !edited;
}
function resetTranslation() {
  $("output").textContent = lastTranslation;
  updateResetBtn();
  hideAltMenu();
}

// ---- Post-edit: alternative wording on double-click ------------------------
function hideAltMenu() { $("altmenu").hidden = true; $("altmenu").innerHTML = ""; }

async function onWordDblClick(e) {
  const eng = CONFIG && CONFIG.engines.find((x) => x.name === $("engine").value);
  if (!eng || !eng.alternatives) return;   // only LLM engines offer alternatives
  const sel = window.getSelection();
  const word = sel && sel.toString().trim();
  if (!word) return;
  const range = sel.getRangeAt(0).cloneRange();
  const sentence = $("output").textContent;
  showAltMenu(e.clientX, e.clientY, word, sentence, range);
}

function positionAltMenu(x, y) {
  const m = $("altmenu");
  m.style.left = "0px"; m.style.top = "0px"; m.hidden = false;
  const w = m.offsetWidth, h = m.offsetHeight;
  m.style.left = Math.max(6, Math.min(x, window.innerWidth - w - 6)) + "px";
  m.style.top = Math.max(6, Math.min(y + 8, window.innerHeight - h - 6)) + "px";
}

async function showAltMenu(x, y, word, sentence, range) {
  const m = $("altmenu");
  m.innerHTML = `<div class="althead">「${word}」の言い換え</div>`
    + `<div class="altnote">候補を取得中…</div>`;
  positionAltMenu(x, y);
  const menuSeq = ++altSeq;
  let data;
  try {
    const res = await fetch("/api/alternatives", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sentence, selection: word,
        src: CONFIG.lastDetected || $("src").value,
        tgt: $("tgt").value,
        engine: $("engine").value,
      }),
    });
    data = await res.json();
  } catch (e) {
    data = { error: "通信エラー" };
  }
  if (menuSeq !== altSeq || m.hidden) return;   // superseded or dismissed
  const note = (msg) => `<div class="altnote">${msg}</div>`;
  let body = `<div class="althead">「${word}」の言い換え</div>`;
  if (data.unsupported) {
    body += note(data.reason || "この機能は利用できません。");
  } else if (data.error) {
    body += note("候補を取得できませんでした。");
  } else if (!data.alternatives || !data.alternatives.length) {
    body += note("候補が見つかりませんでした。");
  } else {
    m.innerHTML = body;
    for (const alt of data.alternatives) {
      const b = document.createElement("button");
      b.textContent = alt;
      b.onclick = () => { replaceRange(range, alt); hideAltMenu(); };
      m.appendChild(b);
    }
    positionAltMenu(x, y);
    return;
  }
  m.innerHTML = body;
  positionAltMenu(x, y);
}

function replaceRange(range, text) {
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  $("output").focus();
  // execCommand keeps a native undo entry; fall back to manual DOM edit.
  if (!document.execCommand || !document.execCommand("insertText", false, text)) {
    range.deleteContents();
    range.insertNode(document.createTextNode(text));
  }
  updateResetBtn();
}

init();
</script>
</body>
</html>
