[project]
name = "auto-translator"
version = "1.0.0"
description = "Offline-first local translation app: browser GUI + Argos Translate (CPU-only NMT)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "argostranslate>=1.9",
    "langdetect>=1.0.9",
]

[tool.uv]
# This is a runnable app, not a distributable package — don't try to build it.
package = false
