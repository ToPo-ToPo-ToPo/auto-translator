[project]
name = "auto-translator"
version = "1.0.0"
description = "Offline-first local translation app: browser GUI + Argos Translate (NMT) and an optional llama.cpp small-LLM engine (Gemma 4)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "argostranslate>=1.9",
    "langdetect>=1.0.9",
    # llama.cpp small-LLM engine (Gemma 4 GGUF). Portable wheels across platforms.
    "llama-cpp-python>=0.3",
    "huggingface-hub>=0.20",
    # MLX small-LLM engine (Apple Silicon). Pinned to the version the model was
    # converted with — convert/load must match. Installed only on darwin/arm64.
    "mlx-vlm==0.6.3 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
]

[tool.uv]
# This is a runnable app, not a distributable package — don't try to build it.
package = false
